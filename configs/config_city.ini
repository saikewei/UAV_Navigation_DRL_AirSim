[options]
env_name = City_Custom
dynamic_name = Multirotor

navigation_3d = True
using_velocity_state = False
reward_type = reward_final

; depth, lgmd, vector
perception = depth

algo = SAC
total_timesteps = 200000

policy_name = No_CNN
net_arch = [64, 32, 16]
activation_function = tanh
cnn_feature_num = 25

keyboard_debug = False
generate_q_map = False
q_map_save_steps = 1000

use_wandb = False

[wandb]
name = City-Custom-MR-3D-NoCNN-SAC
notes = city custom multirotor 3d with no_cnn

[environment]
max_depth_meters = 20
screen_height = 80
screen_width = 100

crash_distance = 2
accept_radius = 2
drone_clearance = 3.0
goal_sample_max_tries = 200

[multirotor]
dt = 0.1
acc_xy_max = 2.0
v_xy_max = 5
v_xy_min = 0.5
v_z_max = 2.0
yaw_rate_max_deg = 30.0

; configs for DRL algorithms
[DRL]
gamma = 0.99
learning_rate = 3e-4
learning_starts = 5000
buffer_size = 50000
batch_size = 256
train_freq = 100
gradient_steps = 100
action_noise_sigma = 0.1
